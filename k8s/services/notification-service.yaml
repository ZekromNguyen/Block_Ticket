apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  Logging__LogLevel__Microsoft.EntityFrameworkCore: "Warning"
  RabbitMQ__Host: "rabbitmq-service"
  RabbitMQ__Username: "guest"
  RabbitMQ__VirtualHost: "/"
  RabbitMQ__Port: "5672"
  Email__SmtpHost: "mailhog-service"
  Email__SmtpPort: "1025"
  Email__FromEmail: "noreply@blockticket.com"
  Email__FromName: "BlockTicket"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-api
        image: ghcr.io/your-org/blockticket/notification-api:0.0.0-placeholder
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: notification-config
        - secretRef:
            name: notification-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command: 
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: wait-for-rabbitmq
        image: rabbitmq:3-management-alpine
        command:
        - sh
        - -c
        - |
          until rabbitmq-diagnostics -h rabbitmq-service check_port_connectivity; do
            echo "Waiting for RabbitMQ..."
            sleep 2
          done