apiVersion: v1
kind: ConfigMap
metadata:
  name: blockchain-orchestrator-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  Logging__LogLevel__Microsoft.EntityFrameworkCore: "Warning"
  Blockchain__ContractAddress: "0x0000000000000000000000000000000000000000"
  Service__Name: "blockchain-orchestrator"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-orchestrator
  labels:
    app: blockchain-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blockchain-orchestrator
  template:
    metadata:
      labels:
        app: blockchain-orchestrator
    spec:
      containers:
      - name: blockchain-orchestrator
        image: ghcr.io/your-org/blockticket/blockchain-orchestrator:0.0.0-placeholder
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: blockchain-orchestrator-config
        - secretRef:
            name: blockchain-orchestrator-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: wait-for-rabbitmq
        image: rabbitmq:3-management-alpine
        command:
        - sh
        - -c
        - |
          until rabbitmq-diagnostics -h rabbitmq-service check_port_connectivity; do
            echo "Waiting for RabbitMQ..."
            sleep 2
          done
---

apiVersion: v1
kind: Service
metadata:
  name: blockchain-orchestrator
spec:
  selector:
    app: blockchain-orchestrator
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
