apiVersion: v1
kind: ConfigMap
metadata:
  name: event-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Jwt__Issuer: "BlockTicket.EventService"
  Jwt__Audience: "BlockTicket.Clients"
  RabbitMQ__Host: "rabbitmq-service"
  RabbitMQ__Username: "guest"
  RabbitMQ__VirtualHost: "/"
  RabbitMQ__Port: "5672"
  Redis__Database: "0"
  Redis__KeyPrefix: "event:"
  Redis__DefaultTTL: "00:05:00"
  Cache__CatalogTTL: "00:00:30"
  Cache__SeatMapTTL: "00:05:00"
  Cache__AvailabilityTTL: "00:00:10"
  Cache__PricingTTL: "00:01:00"
  Cache__SearchResultsTTL: "00:00:30"
  EventService__MaxEventsPerPage: "50"
  EventService__DefaultReservationTTL: "00:10:00"
  EventService__MaxReservationExtensions: "2"
  EventService__SeatLockDuration: "00:10:00"
  EventService__EnableDynamicPricing: "false"
  EventService__EnableSeatMapCaching: "true"
  EventService__EnableSearchCaching: "true"
  RateLimiting__IsEnabled: "true"
  RateLimiting__GlobalLimit: "5000"
  RateLimiting__PerIpLimit: "500"
  RateLimiting__WindowSizeInMinutes: "1"
  SecurityHeaders__EnableHsts: "true"
  SecurityHeaders__EnableContentSecurityPolicy: "true"
  SecurityHeaders__EnableXFrameOptions: "true"
  SecurityHeaders__EnableXContentTypeOptions: "true"
  Security__RequireHttps: "true"
  Security__EnableCors: "true"
  Security__AllowedOrigins__0: "https://blockticket.com"
  Security__AllowedOrigins__1: "https://app.blockticket.com"
  Security__JwtSettings__Issuer: "BlockTicket.EventService"
  Security__JwtSettings__Audience: "BlockTicket.Clients"
  Security__JwtSettings__TokenLifetime: "01:00:00"
  HealthChecks__UI__EvaluationTimeInSeconds: "10"
  HealthChecks__UI__MinimumSecondsBetweenFailureNotifications: "60"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  labels:
    app: event-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
      - name: event-api
        image: ghcr.io/your-org/blockticket/event-api:0.0.0-placeholder
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: event-config
        - secretRef:
            name: event-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command: 
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: wait-for-redis
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          until redis-cli -h redis-service -p 6379 -a redis_password ping; do
            echo "Waiting for Redis..."
            sleep 2
          done
      - name: wait-for-rabbitmq
        image: rabbitmq:3-management-alpine
        command:
        - sh
        - -c
        - |
          until rabbitmq-diagnostics -h rabbitmq-service check_port_connectivity; do
            echo "Waiting for RabbitMQ..."
            sleep 2
          done
---

apiVersion: v1
kind: Service
metadata:
  name: event-service
spec:
  selector:
    app: event-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
