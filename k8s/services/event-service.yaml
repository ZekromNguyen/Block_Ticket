apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: blockticket
  labels:
    app: event-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
      - name: event-api
        image: ndtuyen0604/event-api:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: event-config
        - secretRef:
            name: event-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command: 
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: wait-for-redis
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          until redis-cli -h redis-service -p 6379 -a redis_password ping; do
            echo "Waiting for Redis..."
            sleep 2
          done
      - name: wait-for-rabbitmq
        image: rabbitmq:3-management-alpine
        command:
        - sh
        - -c
        - |
          until rabbitmq-diagnostics -h rabbitmq-service check_port_connectivity; do
            echo "Waiting for RabbitMQ..."
            sleep 2
          done
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: blockticket
spec:
  selector:
    app: event-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP





