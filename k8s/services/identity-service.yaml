apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Authentication__Authority: "https://identity-service.blockticket.svc.cluster.local"
  Authentication__Audience: "blockticket-api"
  Application__BaseUrl: "https://blockticket.com"
  Application__EmailConfirmationPath: "/confirm-email"
  Application__PasswordResetPath: "/reset-password"
  Security__RequireEmailConfirmation: "false"
  Security__RequirePhoneConfirmation: "false"
  Security__DefaultMfaEnabled: "false"
  Security__MaxLoginAttempts: "10"
  Security__LockoutDurationMinutes: "5"
  Security__MonitoringIntervalMinutes: "5"
  Security__DataRetentionDays: "90"
  Email__SmtpHost: "mailhog-service"
  Email__SmtpPort: "1025"
  Email__FromEmail: "ndtuyen0604@gmail.com"
  Email__FromName: "BlockTicket"
  OpenIddict__TokenLifetimes__AccessToken: "60"
  OpenIddict__TokenLifetimes__RefreshToken: "43200"
  OpenIddict__TokenLifetimes__IdentityToken: "15"
  RateLimiting__AuthEndpoints__PermitLimit: "10"
  RateLimiting__AuthEndpoints__WindowMinutes: "1"
  RateLimiting__MfaEndpoints__PermitLimit: "5"
  RateLimiting__MfaEndpoints__WindowMinutes: "1"
  RateLimiting__AdminEndpoints__PermitLimit: "100"
  RateLimiting__AdminEndpoints__WindowMinutes: "1"
  Cors__AllowedOrigins__0: "https://blockticket.com"
  Cors__AllowedOrigins__1: "https://app.blockticket.com"
  HealthChecks__UI__Enabled: "true"
  HealthChecks__UI__Path: "/health-ui"
  RabbitMQ__Host: "rabbitmq-service"
  RabbitMQ__Username: "guest"
  RabbitMQ__Password: "guest"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  labels:
    app: identity-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-api
        image: ghcr.io/your-org/blockticket/identity-api:0.0.0-placeholder
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: identity-config
        - secretRef:
            name: identity-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command: 
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: wait-for-redis
        image: redis:7-alpine
        command:
        - sh
        - -c
        - |
          until redis-cli -h redis-service -p 6379 -a redis_password ping; do
            echo "Waiting for Redis..."
            sleep 2
          done
---

apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
