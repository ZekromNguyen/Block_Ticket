apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  IdentityServer__Authority: "http://identity-service"
  ReverseProxy__Routes__identity-route__ClusterId: "identity-cluster"
  ReverseProxy__Routes__identity-route__Match__Path: "/api/identity/{**catch-all}"
  ReverseProxy__Routes__event-route__ClusterId: "event-cluster"
  ReverseProxy__Routes__event-route__Match__Path: "/api/events/{**catch-all}"
  ReverseProxy__Routes__ticketing-route__ClusterId: "ticketing-cluster"
  ReverseProxy__Routes__ticketing-route__Match__Path: "/api/tickets/{**catch-all}"
  ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address: "http://identity-service"
  ReverseProxy__Clusters__event-cluster__Destinations__destination1__Address: "http://event-service"
  ReverseProxy__Clusters__ticketing-cluster__Destinations__destination1__Address: "http://ticketing-service"
  AllowedHosts: "*"
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ghcr.io/your-org/blockticket/api-gateway:0.0.0-placeholder
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: api-gateway-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
