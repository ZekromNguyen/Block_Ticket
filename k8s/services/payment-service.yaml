apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-config
  namespace: blockticket
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:80"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  Logging__LogLevel__Microsoft.EntityFrameworkCore: "Warning"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
  namespace: blockticket
type: Opaque
data:
  ConnectionStrings__DefaultConnection: SG9zdD1wb3N0Z3Jlcy1zZXJ2aWNlO1BvcnQ9NTQzMjtEYXRhYmFzZT1CbG9ja1RpY2tldF9QYXltZW50O1VzZXJuYW1lPXBvc3RncmVzO1Bhc3N3b3JkPXBvc3RncmVzO0luY2x1ZGUgRXJyb3IgRGV0YWlsPXRydWU= # base64 encoded connection string
  PaymentGateway__ApiKey: eW91ci1wYXltZW50LWdhdGV3YXktYXBpLWtleQ== # base64 encoded payment gateway API key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: blockticket
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-api
        image: ndtuyen0604/payment-api:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: payment-config
        - secretRef:
            name: payment-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command: 
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: blockticket
spec:
  selector:
    app: payment-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP










