apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-config
  namespace: blockticket
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:80"
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.AspNetCore: "Warning"
  Logging__LogLevel__Microsoft.EntityFrameworkCore: "Warning"
---
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secret
  namespace: blockticket
type: Opaque
data:
  ConnectionStrings__DefaultConnection: SG9zdD1wb3N0Z3Jlcy1zZXJ2aWNlO1BvcnQ9NTQzMjtEYXRhYmFzZT1CbG9ja1RpY2tldF9UaWNrZXRpbmc7VXNlcm5hbWU9cG9zdGdyZXM7UGFzc3dvcmQ9cG9zdGdyZXM7SW5jbHVkZSBFcnJvciBEZXRhaWw9dHJ1ZQ== # base64 encoded connection string
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-service
  namespace: blockticket
  labels:
    app: ticketing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing-service
  template:
    metadata:
      labels:
        app: ticketing-service
    spec:
      containers:
      - name: ticketing-api
        image: ndtuyen0604/ticketing-api:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: ticketing-config
        - secretRef:
            name: ticketing-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        command: 
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-service
  namespace: blockticket
spec:
  selector:
    app: ticketing-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP










