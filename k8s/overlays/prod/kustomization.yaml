apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: blockticket

resources:
  - ../../base
  - ../../addons/external-secrets
  - ../../ingress/ingress.yaml

components:
  - images

patches:
  - path: namespace-prod.yaml
    target:
      kind: Namespace
      name: blockticket
  - path: replicas-prod.yaml
  - path: managed-secrets-prod.yaml
  - path: config-prod.yaml
