apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: blockticket-services
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - blockticket
      - blockticket-staging
      - blockticket-dev
  selector:
    matchExpressions:
      - key: app
        operator: Exists
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
