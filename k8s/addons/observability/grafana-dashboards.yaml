apiVersion: v1
kind: ConfigMap
metadata:
  name: blockticket-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  blockticket-api.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {}},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(rate(http_server_request_duration_seconds_count{namespace=~\"blockticket.*\"}[5m])) by (service)"}],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "id": 2,
          "targets": [{"expr": "sum(rate(http_server_request_duration_seconds_count{namespace=~\"blockticket.*\",status_code=~\"5..\"}[5m])) by (service) / sum(rate(http_server_request_duration_seconds_count{namespace=~\"blockticket.*\"}[5m])) by (service)"}],
          "title": "5xx Error Ratio",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
          "id": 3,
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{namespace=~\"blockticket.*\"}[5m])) by (le, service))"}],
          "title": "p95 Latency",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["blockticket", "api"],
      "time": {"from": "now-6h", "to": "now"},
      "title": "BlockTicket API Overview",
      "uid": "blockticket-api"
    }
