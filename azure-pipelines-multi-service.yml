# Docker - Multi-Service Build Template
# Build and push multiple microservice images to Azure Container Registry
# This template can be used when you have Dockerfiles for multiple services

trigger:
  paths:
    include:
      - src/Services/**
      - src/Shared/**
      - src/ApiGateway/**

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'f0bba39a-badd-44e3-a3d7-b1142b99c980'
  containerRegistry: 'blockticket.azurecr.io'
  tag: '$(Build.BuildId)'

pool:
  name: 'blockticket'

stages:
- stage: BuildAndPush
  displayName: Build and Push All Services
  jobs:
  # Identity Service
  - job: Identity
    displayName: Identity Service
    steps:
    - task: Docker@2
      displayName: Build and push Identity service
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: 'blockticket-identity'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/src/Services/Identity/Identity.API/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(tag)
          latest

