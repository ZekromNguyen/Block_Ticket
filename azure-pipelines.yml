# ============================================================================
# STAGE 2: Update Kubernetes Manifests
# ============================================================================
- stage: UpdateManifests
  displayName: Update K8s Manifests
  dependsOn: BuildAndPush
  condition: succeeded()
  jobs:
  - job: UpdateImageTags
    displayName: Update Image Tags in Manifests
    steps:
    - checkout: self
      persistCredentials: true
      
    - bash: |
        echo "Updating image tags to $(tag)"
        
        # Update Identity service
        sed -i "s|image: $(containerRegistry)/blockticket-identity:.*|image: $(containerRegistry)/blockticket-identity:$(tag)|g" k8s/services/identity-service.yaml
        
        # Uncomment and add other services as needed
        # sed -i "s|image: $(containerRegistry)/blockticket-event:.*|image: $(containerRegistry)/blockticket-event:$(tag)|g" k8s/services/event-service.yaml
        # sed -i "s|image: $(containerRegistry)/blockticket-payment:.*|image: $(containerRegistry)/blockticket-payment:$(tag)|g" k8s/services/payment-service.yaml
        
        echo "Updated manifests:"
        git diff k8s/services/
      displayName: 'Update image tags in K8s manifests'
      
    - bash: |
        git config user.email "azure-pipelines@blockticket.com"
        git config user.name "Azure Pipelines"
        git add k8s/services/*.yaml
        git commit -m "Update image tags to build $(tag) [skip ci]" || echo "No changes to commit"
        git push origin HEAD:$(Build.SourceBranch)
      displayName: 'Commit updated manifests'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

# ============================================================================
# STAGE 3: Deploy to Development/Staging
# ============================================================================
- stage: DeployDev
  displayName: Deploy to Development
  dependsOn: UpdateManifests
  condition: succeeded()
  jobs:
  - deployment: DeployToK8s
    displayName: Deploy to Kubernetes
    environment: 'blockticket-dev'  # Create this environment in Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - task: KubernetesManifest@0
            displayName: Deploy Identity Service
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: '$(kubernetesServiceConnection)'
              namespace: '$(namespace)'
              manifests: |
                $(Build.SourcesDirectory)/k8s/services/identity-service.yaml
              containers: |
                $(containerRegistry)/blockticket-identity:$(tag)
          
          # Uncomment to deploy other services
          # - task: KubernetesManifest@0
          #   displayName: Deploy Event Service
          #   inputs:
          #     action: 'deploy'
          #     kubernetesServiceConnection: '$(kubernetesServiceConnection)'
          #     namespace: '$(namespace)'
          #     manifests: |
          #       $(Build.SourcesDirectory)/k8s/services/event-service.yaml
          #     containers: |
          #       $(containerRegistry)/blockticket-event:$(tag)
          
          - bash: |
              echo "Deployment completed!"
              echo "Checking pod status..."
              kubectl get pods -n $(namespace) -l app=identity-service
            displayName: 'Verify deployment'

# ============================================================================
# STAGE 4: Deploy to Production (Manual Approval Required)
# ============================================================================
- stage: DeployProd
  displayName: Deploy to Production
  dependsOn: DeployDev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToProduction
    displayName: Deploy to Production K8s
    environment: 'blockticket-prod'  # Create this environment with approval gates
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - task: KubernetesManifest@0
            displayName: Deploy Identity Service to Production
            inputs:
              action: 'deploy'
              kubernetesServiceConnection: '$(kubernetesServiceConnection)'
              namespace: '$(namespace)'
              manifests: |
                $(Build.SourcesDirectory)/k8s/services/identity-service.yaml
              containers: |
                $(containerRegistry)/blockticket-identity:$(tag)
          
          - bash: |
              echo "Production deployment completed!"
              echo "Checking production pod status..."
              kubectl get pods -n $(namespace) -l app=identity-service
              kubectl get svc -n $(namespace)
            displayName: 'Verify production deployment'
