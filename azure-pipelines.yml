# Docker - Multi-Service Build and Deploy Pipeline for Kubernetes
# Build images, push to Azure Container Registry, and deploy to Kubernetes cluster

trigger:
  paths:
    include:
      - src/Services/**
      - src/Shared/**
      - src/ApiGateway/**
      - k8s/services/**

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'f0bba39a-badd-44e3-a3d7-b1142b99c980'
  containerRegistry: 'blockticket.azurecr.io'
  tag: '$(Build.BuildId)'
  
  # Kubernetes configuration
  kubernetesServiceConnection: 'blockticket-k8s'  # Update with your K8s service connection name
  namespace: 'blockticket'

pool:
  name: 'blockticket'

stages:
# ============================================================================
# STAGE 1: Build and Push Docker Images
# ============================================================================
- stage: BuildAndPush
  displayName: Build and Push Images
  jobs:
  
  # Identity Service
  - job: BuildIdentity
    displayName: Build Identity Service
    steps:
    - task: Docker@2
      displayName: Build and push Identity service
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: 'blockticket-identity'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/src/Services/Identity/Identity.API/Dockerfile'
        buildContext: '$(Build.SourcesDirectory)'
        tags: |
          $(tag)
          latest

  # Event Service (uncomment when Dockerfile is ready)
