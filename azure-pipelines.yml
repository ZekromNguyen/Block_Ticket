  #       repository: 'blockticket-payment'
  #       command: 'buildAndPush'
  #       Dockerfile: '$(Build.SourcesDirectory)/src/Services/Payment/Payment.API/Dockerfile'
  #       buildContext: '$(Build.SourcesDirectory)'
  #       tags: |
  #         $(tag)
  #         latest

  # Notification Service (uncomment when Dockerfile is ready)
  # - job: BuildNotification
  #   displayName: Build Notification Service
  #   steps:
  #   - task: Docker@2
  #     displayName: Build and push Notification service
  #     inputs:
