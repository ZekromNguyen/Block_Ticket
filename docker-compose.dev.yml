version: '3.8'

# Infrastructure services for local development
# Run: docker-compose up -d
# Stop: docker-compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: blockticket-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockticket-network

  redis:
    image: redis:7-alpine
    container_name: blockticket-redis
    command: redis-server --requirepass redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockticket-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blockticket-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - blockticket-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: blockticket-mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI (http://localhost:8025)
    networks:
      - blockticket-network

  # Application service definitions are included for P0 topology awareness.
  # Add Dockerfiles for each service before running these containers directly.
  ticketing-api:
    image: blockticket-ticketing-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Ticketing/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Ticketing;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
      - IdentityServer__Authority=http://identity-api
    ports:
      - "5003:80"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blockticket-network

  blockchain-orchestrator:
    image: blockticket-blockchain-orchestrator:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/BlockchainOrchestrator/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Blockchain;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
      - Blockchain__ContractAddress=0x0000000000000000000000000000000000000000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blockticket-network

  notification-worker:
    image: blockticket-notification-worker:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Notification/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Notification;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blockticket-network

  verification-api:
    image: blockticket-verification-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Verification/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Verification;Username=postgres;Password=postgres;Port=5432
      - IdentityServer__Authority=http://identity-api
      - Services__Ticketing=http://ticketing-api
    ports:
      - "5005:80"
    depends_on:
      postgres:
        condition: service_healthy
      ticketing-api:
        condition: service_started
    networks:
      - blockticket-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  blockticket-network:
    driver: bridge
