version: '3.8'

# Infrastructure services for local development
# Run: docker-compose up -d
# Stop: docker-compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: blockticket-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockticket-network

  redis:
    image: redis:7-alpine
    container_name: blockticket-redis
    command: redis-server --requirepass redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blockticket-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blockticket-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - blockticket-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: blockticket-mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI (http://localhost:8025)
    networks:
      - blockticket-network

  # Application service definitions are included for P0 topology awareness.
  # Add Dockerfiles for each service before running these containers directly.
  ticketing-api:
    image: blockticket-ticketing-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Ticketing/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Ticketing;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
      - ConnectionStrings__Redis=redis:6379,password=redis_password
      - IdentityServer__Authority=http://identity-api
      - Services__Event=http://event-api
      - Service__Name=ticketing-api
    ports:
      - "5003:80"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blockticket-network

  identity-api:
    image: blockticket-identity-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Identity/Identity.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Identity;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__Redis=redis:6379,password=redis_password
      - Service__Name=identity-api
    ports:
      - "5001:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blockticket-network

  event-api:
    image: blockticket-event-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Event/Event.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Event;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__Redis=redis:6379,password=redis_password
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
      - IdentityServer__Authority=http://identity-api
      - Service__Name=event-api
    ports:
      - "5002:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blockticket-network

  api-gateway:
    image: blockticket-api-gateway:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - IdentityServer__Authority=http://identity-api
      - Service__Name=api-gateway
    ports:
      - "5000:80"
    depends_on:
      identity-api:
        condition: service_started
      event-api:
        condition: service_started
      ticketing-api:
        condition: service_started
    networks:
      - blockticket-network

  blockchain-orchestrator:
    image: blockticket-blockchain-orchestrator:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/BlockchainOrchestrator/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Blockchain;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
      - Blockchain__ContractAddress=0x0000000000000000000000000000000000000000
      - Service__Name=blockchain-orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blockticket-network

  notification-worker:
    image: blockticket-notification-worker:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Notification/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Notification;Username=postgres;Password=postgres;Port=5432
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
      - Service__Name=notification-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blockticket-network

  verification-api:
    image: blockticket-verification-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Verification/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BlockTicket_Verification;Username=postgres;Password=postgres;Port=5432
      - IdentityServer__Authority=http://identity-api
      - Services__Ticketing=http://ticketing-api
      - Service__Name=verification-api
    ports:
      - "5005:80"
    depends_on:
      postgres:
        condition: service_healthy
      ticketing-api:
        condition: service_started
    networks:
      - blockticket-network

  resale-api:
    image: blockticket-resale-api:local
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Services/Resale/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - IdentityServer__Authority=http://identity-api
      - Services__Ticketing=http://ticketing-api
      - Service__Name=resale-api
    ports:
      - "5004:80"
    depends_on:
      ticketing-api:
        condition: service_started
    networks:
      - blockticket-network

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    container_name: blockticket-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - blockticket-network

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    container_name: blockticket-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - blockticket-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  blockticket-network:
    driver: bridge
