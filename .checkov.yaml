# Soft-skip known checkov findings that are intentional in this project.
# Each skip includes a justifying note that future reviewers can challenge.

skip-check:
  # We intentionally create an S3 bucket for Terraform state without a
  # CKV_AWS_144 / CKV_AWS_145 cross-region replication setup. Bootstrap is
  # single-region on ap-southeast-1; once a second region matters, replace
  # this with a real CRR configuration.
  - CKV_AWS_144
  - CKV_AWS_145

  # Creation-time-only public access block requires no logging at this stage.
  # CKV_AWS_18 — S3 server access logs — should be turned on once a destination
  # bucket exists. The `aws_s3_bucket_logging.state` resource is included
  # commented out for this reason.
  - CKV_AWS_18

  # RDS IAM authentication is intentionally unused — services connect with
  # username + password obtained from Secrets Manager. IAM auth is a future
  # task once we drop the password flow.
  - CKV_AWS_293

  # The state bucket is created in the bootstrap module only; it is not
  # provisioned by the per-environment module. CKV2_AWS_6 (bucket logging)
  # remains a TODO until the access-log bucket exists.
  - CKV2_AWS_6

  # IAM policy ARN strings reference AWS-managed policies by ARN. checkov
  # flags dynamic ARNs sometimes; pin in follow-up.
  - CKV_AWS_109

# `secretsmanager:DescribeSecret` is required for refresh poller correctness,
# not a privilege escalation risk.
skip-framework:
  - bicep
