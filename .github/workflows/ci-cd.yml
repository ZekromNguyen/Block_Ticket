name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "GitHub Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  contents: write
  id-token: write
  packages: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  SOLUTION_FILE: BlockTicket.sln
  REGISTRY: ${{ vars.CONTAINER_REGISTRY || 'ghcr.io' }}
  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || github.repository }}

jobs:
  build-test:
    name: Restore, Build, Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Audit NuGet dependencies
        run: dotnet list ${{ env.SOLUTION_FILE }} package --vulnerable --include-transitive

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          --collect "XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          retention-days: 14

  docker-build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-test

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: identity-api
            dockerfile: src/Services/Identity/Identity.API/Dockerfile
            context: .
          - name: api-gateway
            dockerfile: src/ApiGateway/Dockerfile
            context: .
          - name: event-api
            dockerfile: src/Services/Event/Event.API/Dockerfile
            context: .
          - name: ticketing-api
            dockerfile: src/Services/Ticketing/Dockerfile
            context: .
          - name: notification-api
            dockerfile: src/Services/Notification/Dockerfile
            context: .
          - name: blockchain-orchestrator
            dockerfile: src/Services/BlockchainOrchestrator/Dockerfile
            context: .
          - name: resale-api
            dockerfile: src/Services/Resale/Dockerfile
            context: .
          - name: verification-api
            dockerfile: src/Services/Verification/Dockerfile
            context: .

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Normalize image repository
        id: image
        shell: bash
        run: |
          namespace="$(echo "${IMAGE_NAMESPACE}" | tr '[:upper:]' '[:lower:]')"
          registry="$(echo "${REGISTRY}" | tr '[:upper:]' '[:lower:]')"
          echo "repository=${registry}/${namespace}/${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Login to GitHub Container Registry
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to custom container registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Generate SBOM
        shell: bash
        run: |
          syft "${{ steps.image.outputs.repository }}:${{ steps.meta.outputs.version }}" -o spdx-json=sbom-${{ matrix.service.name }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}.spdx.json
          retention-days: 30

      - name: Sign image
        shell: bash
        run: cosign sign --yes "${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service.name }}.sarif
          category: trivy-${{ matrix.service.name }}

  promote:
    name: Promote GitOps Image State
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - build-test
      - docker-build
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master'
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc') && 'staging' || startsWith(github.ref, 'refs/tags/v') && 'production' || github.event.inputs.deploy_environment || 'dev' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Crane
        uses: imjasonh/setup-crane@v0.4

      - name: Determine target environment
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            env_name="${{ github.event.inputs.deploy_environment }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* && "${GITHUB_REF}" == *-rc* ]]; then
            env_name="staging"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            env_name="production"
          else
            env_name="dev"
          fi

          case "${env_name}" in
            dev)        namespace="blockticket-dev"; overlay="dev" ;;
            staging)    namespace="blockticket-staging"; overlay="staging" ;;
            production) namespace="blockticket"; overlay="prod" ;;
            *)          echo "::error::Unsupported deploy environment ${env_name}"; exit 1 ;;
          esac

          echo "environment=${env_name}" >> "$GITHUB_OUTPUT"
          echo "overlay=${overlay}" >> "$GITHUB_OUTPUT"
          echo "k8s_namespace=${namespace}" >> "$GITHUB_OUTPUT"

      - name: Verify image signatures
        shell: bash
        run: |
          registry="$(echo "${REGISTRY}" | tr '[:upper:]' '[:lower:]')"
          namespace="$(echo "${IMAGE_NAMESPACE}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA::7}"

          services=(
            identity-api
            api-gateway
            event-api
            ticketing-api
            notification-api
            blockchain-orchestrator
            resale-api
            verification-api
          )

          for service in "${services[@]}"; do
            image="${registry}/${namespace}/${service}:${tag}"
            digest="$(crane digest "${image}")"
            ref="${registry}/${namespace}/${service}@${digest}"

            cosign verify \
              --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/ci-cd.yml@refs/(tags|heads)/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${ref}" >/dev/null

            echo "verified ${ref}"
          done

      - name: Update GitOps image state
        shell: bash
        run: |
          registry="$(echo "${REGISTRY}" | tr '[:upper:]' '[:lower:]')"
          namespace="$(echo "${IMAGE_NAMESPACE}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA::7}"
          overlay_dir="k8s/overlays/${{ steps.target.outputs.overlay }}"

          pushd "${overlay_dir}/images" >/dev/null
          for service in api-gateway identity-api event-api ticketing-api notification-api blockchain-orchestrator resale-api verification-api; do
            kustomize edit set image "ghcr.io/your-org/blockticket/${service}=${registry}/${namespace}/${service}:${tag}"
          done
          popd >/dev/null

      - name: Commit promotion
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "k8s/overlays/${{ steps.target.outputs.overlay }}/images/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "Image state already up to date."
            exit 0
          fi
          git commit -m "promote ${{ steps.target.outputs.environment }} images to ${GITHUB_SHA::7}"
          git push
