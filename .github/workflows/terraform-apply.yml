name: Terraform Apply

on:
  pull_request:
    types:
      - labeled
      - synchronize
      - opened
      - reopened
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "Action to perform"
        type: choice
        default: "plan"
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: terraform-${{ github.event.inputs.environment || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-plan:
    name: PR Terraform Plan
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'terraform-apply')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        environment:
          - dev
          - staging
          - prod

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform init
        shell: bash
        run: |
          cd "infra/terraform/aws/environments/${{ matrix.environment }}"
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=pr/${{ github.event.pull_request.number }}/${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'ap-southeast-1' }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        shell: bash
        run: |
          cd "infra/terraform/aws/environments/${{ matrix.environment }}"
          terraform plan -out=terraform.tfplan -input=false -lock=true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform.tfplan-pr-${{ matrix.environment }}
          path: infra/terraform/aws/environments/${{ matrix.environment }}/terraform.tfplan
          retention-days: 7

  dispatch-plan:
    name: Terraform Plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Terraform init
        shell: bash
        run: |
          cd "infra/terraform/aws/environments/${{ github.event.inputs.environment }}"
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=envs/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'ap-southeast-1' }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        shell: bash
        run: |
          cd "infra/terraform/aws/environments/${{ github.event.inputs.environment }}"
          terraform plan -out=terraform.tfplan -input=false -lock=true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform.tfplan-${{ github.event.inputs.environment }}
          path: infra/terraform/aws/environments/${{ github.event.inputs.environment }}/terraform.tfplan
          retention-days: 7

  terraform-apply:
    name: Terraform Apply
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: dispatch-plan
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform.tfplan-${{ github.event.inputs.environment }}
          path: infra/terraform/aws/environments/${{ github.event.inputs.environment }}

      - name: Terraform init
        shell: bash
        run: |
          cd "infra/terraform/aws/environments/${{ github.event.inputs.environment }}"
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=envs/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'ap-southeast-1' }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        shell: bash
        run: |
          cd "infra/terraform/aws/environments/${{ github.event.inputs.environment }}"
          terraform apply -input=false -auto-approve terraform.tfplan
